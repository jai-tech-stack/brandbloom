[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt --break-system-packages"]

[start]
# Run the full agentic BLOOM+ API (brand extraction, logo, generations). No emergentintegrations needed.
cmd = "cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT"